<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
      <animate attributeName="x1" values="-100%;100%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <animate attributeName="x1" values="-50%;100%" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;150%" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Accent line top -->
  <rect x="100" y="38" width="600" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- Main title -->
  <text x="400" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="8">
    ReGen
  </text>

  <!-- Subtitle -->
  <text x="400" y="145" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#8b949e" letter-spacing="4">
    AI-POWERED REPORT GENERATOR
  </text>

  <!-- Accent line bottom -->
  <rect x="100" y="162" width="600" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- Small decorative dots -->
  <circle cx="80" cy="100" r="2" fill="#58a6ff" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="100" r="2" fill="#bc8cff" opacity="0.4">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="60" r="1.5" fill="#bc8cff" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="140" r="1.5" fill="#58a6ff" opacity="0.3">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
